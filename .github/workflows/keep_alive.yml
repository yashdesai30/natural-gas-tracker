name: Keep Render Alive
on:
  schedule:
    - cron: '*/14 * * * *' # Every 14 minutes
  workflow_dispatch: # Allows manual triggering for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://natural-gas-tracker.onrender.com/health)
          echo "Render Health Check Status: $response"
          if [ "$response" != "200" ]; then
            echo "Warning: Render service might be down or waking up."
          fi
